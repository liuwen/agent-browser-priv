name: Runtime Update Check

on:
  schedule:
    - cron: '37 4 * * *'
  workflow_dispatch:
    inputs:
      create_patchright_pr:
        description: 'Open or update a PR when the Patchright pin is stale'
        type: boolean
        default: true
      patchright_version:
        description: 'Patchright version to pin; defaults to npm latest'
        required: false
        type: string

concurrency: runtime-update-check

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check runtime updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Check Patchright and upstream versions
        id: report
        run: |
          set -euo pipefail
          node scripts/check-runtime-updates.mjs --json > update-report.json
          cat update-report.json
          node scripts/check-runtime-updates.mjs >> "$GITHUB_STEP_SUMMARY"
          node <<'NODE' >> "$GITHUB_OUTPUT"
          import { readFileSync } from 'node:fs';
          const report = JSON.parse(readFileSync('update-report.json', 'utf8'));
          console.log(`patchright_pinned=${report.patchright.pinned}`);
          console.log(`patchright_latest=${report.patchright.latest}`);
          console.log(`patchright_outdated=${report.patchright.outdated}`);
          console.log(`agent_browser_tracked=${report.agent_browser.tracked_upstream_tag}`);
          console.log(`agent_browser_latest=${report.agent_browser.latest_upstream_tag ?? ''}`);
          console.log(`agent_browser_outdated=${report.agent_browser.outdated}`);
          NODE

      - name: Add update summary
        run: |
          {
            echo ""
            echo "## Decision"
            if [ "${{ steps.report.outputs.patchright_outdated }}" = "true" ]; then
              echo "- Patchright bump candidate: ${{ steps.report.outputs.patchright_pinned }} -> ${{ steps.report.outputs.patchright_latest }}"
            else
              echo "- Patchright pin is current."
            fi
            if [ "${{ steps.report.outputs.agent_browser_outdated }}" = "true" ]; then
              echo "- Upstream sync candidate: ${{ steps.report.outputs.agent_browser_tracked }} -> ${{ steps.report.outputs.agent_browser_latest }}"
              echo "- This workflow does not auto-sync upstream agent-browser. Create a sync branch and replay the fork patch stack manually."
            else
              echo "- Upstream agent-browser tag is current."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update Patchright pin
        id: patchright
        run: |
          set -euo pipefail
          create_pr=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.create_patchright_pr }}" != "true" ]; then
            create_pr=false
          fi
          if [ "$create_pr" != "true" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          target="${{ inputs.patchright_version }}"
          if [ -z "$target" ]; then
            target="${{ steps.report.outputs.patchright_latest }}"
          fi
          if [ -z "$target" ] || [ "$target" = "${{ steps.report.outputs.patchright_pinned }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node scripts/update-patchright-version.mjs "$target"
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "target=$target" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update Patchright PR
        if: steps.patchright.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ steps.patchright.outputs.target }}
        run: |
          set -euo pipefail
          branch="codex/update-patchright-${TARGET}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add cli/src/install.rs priv/version-tracking.json
          git commit -m "Update Patchright backend to ${TARGET}"
          git push --force-with-lease origin "$branch"

          cat > pr-body.md <<EOF
          Updates the default Patchright backend pin to ${TARGET}.

          Generated by \`scripts/update-patchright-version.mjs\`, which refreshes the embedded npm package lock used by \`agent-browser install\`.

          Checks before merging:
          - CI passes on active Linux and macOS lanes.
          - A maintainer adds the normal release version/changelog entry if this should publish immediately.
          - \`agent-browser doctor\` reports the installed Patchright version, release pin, and npm latest.

          Upstream agent-browser status at check time:
          - tracked: ${{ steps.report.outputs.agent_browser_tracked }}
          - latest: ${{ steps.report.outputs.agent_browser_latest }}
          EOF

          if gh pr view "$branch" --json number >/tmp/pr.json 2>/dev/null; then
            gh pr edit "$branch" --title "Update Patchright backend to ${TARGET}" --body-file pr-body.md
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "Update Patchright backend to ${TARGET}" \
              --body-file pr-body.md
          fi
